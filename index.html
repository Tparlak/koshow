<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Knight Online 3D Item Viewer. High-performance rendering with classic KO aesthetic.">
    <title>KO CORE | Knight Online Item Viewer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --ko-gold: #fbbf24;
            --ko-gold-dark: #b45309;
            --ko-dark-stone: #111112;
            --ko-border: rgba(251, 191, 36, 0.4);
            --bg-deep: #050508;
            --glass-bg: rgba(5, 5, 10, 0.9);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-width: thin;
            scrollbar-color: var(--ko-gold) transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* RIGHT ALIGNED HUD CONTAINER */
        #hud-container {
            position: absolute;
            top: 20px;
            right: 20px;
            /* Moved to Right */
            width: 260px;
            /* More Minimal Width */
            z-index: 100;
            pointer-events: none;
        }

        #hud-container>* {
            pointer-events: auto;
        }

        /* MINIMAL KO BOX STYLING */
        .ko-box {
            background: linear-gradient(145deg, #1a1a1c, #0d0d0e);
            border: 1px solid var(--ko-gold-dark);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), inset 0 0 10px rgba(251, 191, 36, 0.05);
            position: relative;
            margin-bottom: 15px;
            backdrop-filter: blur(8px);
        }

        /* Decorative Corners */
        .ko-box::before,
        .ko-box::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--ko-gold);
            box-shadow: 0 0 8px var(--ko-gold);
            z-index: 2;
        }

        .ko-box::before {
            top: -2px;
            left: -2px;
        }

        .ko-box::after {
            bottom: -2px;
            right: -2px;
        }

        /* HEADER SECTION */
        .ko-header {
            background: linear-gradient(to bottom, #3a3a40, #111112);
            padding: 10px 14px;
            border-bottom: 1px solid var(--ko-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ko-header h1 {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            color: var(--ko-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(251, 191, 36, 0.5);
        }

        .ko-body {
            padding: 14px;
        }

        /* ICON DISPLAY (Compact) */
        #icon-preview-container {
            width: 52px;
            height: 52px;
            background: radial-gradient(circle, #2a2a2e 0%, #000 100%);
            border: 1px solid var(--ko-gold-dark);
            display: none;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
            box-shadow: inset 0 0 5px #000;
        }

        #inventory-icon {
            width: 42px;
            height: 42px;
            image-rendering: pixelated;
            filter: drop-shadow(0 0 2px rgba(0, 0, 0, 0.8));
        }

        /* INFO TEXT */
        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-bottom: 6px;
            padding-bottom: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .info-label {
            color: var(--ko-gold);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            color: #e2e8f0;
            font-family: 'Inter', monospace;
        }

        /* ASSETS LIST */
        .file-explorer {
            max-height: 140px;
            overflow-y: auto;
            margin-top: 12px;
            border-top: 1px solid var(--ko-border);
            padding-top: 10px;
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }

        .file-explorer::-webkit-scrollbar {
            width: 4px;
        }

        .file-explorer::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        .file-explorer::-webkit-scrollbar-thumb {
            background: var(--ko-gold-dark);
            border-radius: 2px;
        }

        .file-explorer::-webkit-scrollbar-thumb:hover {
            background: var(--ko-gold);
        }

        .file-item {
            font-size: 0.65rem;
            color: var(--text-dim);
            padding: 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
        }

        .file-item:hover {
            color: var(--ko-gold);
        }

        /* BUTTONS (Classic KO Style) */
        .actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            background: linear-gradient(to bottom, #2563eb, #1e3a8a);
            border: 1px solid var(--ko-gold-dark);
            color: #fff;
            font-size: 0.65rem;
            padding: 8px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            text-align: center;
            transition: all 0.2s;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .btn:hover {
            filter: brightness(1.2);
            border-color: var(--ko-gold);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-reset {
            background: linear-gradient(to bottom, #4b5563, #1f2937);
        }

        /* VIEWPORT & OVERLAY */
        #viewport {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* Subtle Vignette Overlay */
        #viewport::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 60%, rgba(0, 0, 0, 0.6) 100%);
            pointer-events: none;
        }

        #drop-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            pointer-events: none;
        }

        body.dropping #drop-overlay {
            display: flex;
        }

        .drop-msg {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            color: var(--ko-gold);
            text-shadow: 0 0 20px var(--ko-gold);
            letter-spacing: 4px;
        }
    </style>
</head>

<body>
    <div id="hud-container">
        <!-- COMPACT KO WINDOW -->
        <div class="ko-box">
            <div class="ko-header">
                <h1>Eşya Bilgisi</h1>
                <span style="font-size: 0.6rem; color: var(--text-dim);">V1.0.4</span>
            </div>
            <div class="ko-body">
                <div id="icon-preview-container">
                    <img id="inventory-icon" src="" alt="">
                </div>

                <div class="info-row">
                    <span class="info-label">İSİM:</span>
                    <span id="info-name" class="info-value">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">YÜZEY:</span>
                    <span id="info-faces" class="info-value">0</span>
                </div>

                <div class="file-explorer" id="file-explorer">
                    <div style="font-size: 0.6rem; opacity: 0.4; text-align:center;">Liste Boş</div>
                </div>

                <div class="actions">
                    <label class="btn">
                        DOSYA SEÇ
                        <input type="file" id="legacy-input" multiple style="display:none;">
                    </label>
                    <button class="btn btn-reset" id="clear-stack">SIFIRLA</button>
                </div>
            </div>
        </div>

        <!-- DOSYA REHBERİ -->
        <div class="ko-box" style="margin-top: -5px; opacity: 0.85;">
            <div class="ko-body" style="padding: 10px;">
                <div style="font-size: 0.65rem; color: var(--text-dim); line-height: 1.6;">
                    <b style="color: var(--ko-gold);">.N3PMESH:</b> 3D Model dosyası.<br>
                    <b style="color: var(--ko-gold);">.DXT:</b> Renk ve kaplama verisi.<br>
                    <b style="color: var(--ko-gold);">.N3CPLUG:</b> Efekt ve parlama noktaları.<br>
                    <b style="color: var(--ko-gold);">ICON_:</b> Envanterdeki 2D görüntüsü.
                </div>
            </div>
        </div>
    </div>

    <main id="viewport">
        <div id="drop-overlay">
            <div class="drop-msg">YÜKLEMEYE HAZIR</div>
        </div>
    </main>

    <script src="https://unpkg.com/three@0.124.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.124.0/examples/js/controls/OrbitControls.js"></script>

    <script src="src/ko_dxt_loader.js"></script>
    <script src="src/ko_mesh_loader.js"></script>
    <script src="src/drop.js"></script>
    <script src="src/scene.js"></script>

    <script>
        const explorer = document.getElementById('file-explorer');
        const iconContainer = document.getElementById('icon-preview-container');
        const inventoryIcon = document.getElementById('inventory-icon');
        const infoName = document.getElementById('info-name');
        const infoFaces = document.getElementById('info-faces');

        function textureToDataURL(texture) {
            if (!texture.image || !texture.image.data) return null;
            const { width, height, data } = texture.image;
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            if (data instanceof Uint8ClampedArray) {
                const imageData = ctx.createImageData(width, height);
                imageData.data.set(data);
                ctx.putImageData(imageData, 0, 0);
                return canvas.toDataURL();
            }
            return null;
        }

        function logFile(filename) {
            if (explorer.innerText.includes("Liste Boş")) explorer.innerHTML = "";
            const item = document.createElement('div');
            item.className = 'file-item';
            item.textContent = "• " + filename;
            explorer.prepend(item);
        }

        window.processFiles = function (files) {
            const fileArray = Array.from(files).sort((a, b) => a.name.toLowerCase().endsWith('.n3pmesh') ? -1 : 1);
            fileArray.forEach(file => {
                const name = file.name.toLowerCase();
                const reader = new FileReader();
                reader.onload = function () {
                    const data = new DataView(reader.result);
                    try {
                        if (name.endsWith('.n3pmesh')) {
                            const mesh = readN3PMesh(data);
                            window.addObject(mesh.vertices, mesh.faces);
                            logFile(file.name);
                            infoName.innerText = file.name.split('.')[0];
                            infoFaces.innerText = mesh.faces.length / 3;
                        } else if (name.endsWith('.dxt')) {
                            const texture = KODXTLoader(data);
                            if (name.startsWith('itemicon_')) {
                                const url = textureToDataURL(texture);
                                if (url) {
                                    iconContainer.style.display = 'flex';
                                    inventoryIcon.src = url;
                                }
                                logFile(file.name);
                            } else {
                                window.addTexture(texture);
                                logFile(file.name);
                            }
                        } else if (name.endsWith('.n3cplug')) {
                            const plugs = readN3CPlug(data);
                            window.addPlugs(plugs.points);
                            logFile(file.name);
                        }
                    } catch (err) { console.error(err); }
                };
                reader.readAsArrayBuffer(file);
            });
        };

        document.getElementById('legacy-input').addEventListener('change', (e) => window.processFiles(e.target.files));
        document.getElementById('clear-stack').addEventListener('click', () => {
            explorer.innerHTML = '<div style="font-size: 0.6rem; opacity: 0.4; text-align:center;">Liste Boş</div>';
            iconContainer.style.display = 'none';
            inventoryIcon.src = "";
            infoName.innerText = "-";
            infoFaces.innerText = "0";
        });
    </script>
</body>

</html>
